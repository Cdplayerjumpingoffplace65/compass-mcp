<svg width="100%" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
<rect x="0" y="0" width="680" height="200" rx="16" fill="#F5F4EF"/>

<!-- Compass icon -->
<circle cx="88" cy="100" r="36" fill="none" stroke="#888780" stroke-width="1.5"/>
<circle cx="88" cy="100" r="28" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
<!-- Needle -->
<path d="M88 68L93 100L88 108L83 100Z" fill="#D85A30" opacity="0.9"/>
<path d="M88 132L93 100L88 92L83 100Z" fill="#B4B2A9" opacity="0.5"/>
<circle cx="88" cy="100" r="3.5" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="1"/>
<!-- Cardinal points -->
<text x="88" y="60" text-anchor="middle" fill="#888780" style="font-family:system-ui,sans-serif;font-size:10px;font-weight:500">N</text>
<text x="88" y="146" text-anchor="middle" fill="#888780" style="font-family:system-ui,sans-serif;font-size:10px">S</text>
<text x="50" y="104" text-anchor="middle" fill="#888780" style="font-family:system-ui,sans-serif;font-size:10px">W</text>
<text x="126" y="104" text-anchor="middle" fill="#888780" style="font-family:system-ui,sans-serif;font-size:10px">E</text>

<!-- Title -->
<text x="160" y="82" style="font-family:system-ui,sans-serif;font-size:28px;font-weight:500" fill="#2C2C2A">Compass MCP</text>
<text x="160" y="110" style="font-family:system-ui,sans-serif;font-size:14px;font-weight:400" fill="#5F5E5A">The missing bridge between Claude Chat, Cowork, and Code</text>

<!-- Three surface pills -->
<rect x="160" y="130" width="64" height="28" rx="14" fill="none" stroke="#534AB7" stroke-width="1"/>
<text x="192" y="148" text-anchor="middle" style="font-family:system-ui,sans-serif;font-size:12px;font-weight:500" fill="#534AB7">Chat</text>

<rect x="236" y="130" width="84" height="28" rx="14" fill="none" stroke="#1D9E75" stroke-width="1"/>
<text x="278" y="148" text-anchor="middle" style="font-family:system-ui,sans-serif;font-size:12px;font-weight:500" fill="#1D9E75">Cowork</text>

<rect x="332" y="130" width="64" height="28" rx="14" fill="none" stroke="#D85A30" stroke-width="1"/>
<text x="364" y="148" text-anchor="middle" style="font-family:system-ui,sans-serif;font-size:12px;font-weight:500" fill="#D85A30">Code</text>

<!-- Connecting dots between pills -->
<circle cx="228" cy="144" r="2" fill="#888780"/>
<circle cx="324" cy="144" r="2" fill="#888780"/>
</svg>
